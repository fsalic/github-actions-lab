name: Matrix Sa Filterima

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Test Node ${{ matrix.node-version }} na ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
        
        # Ovdje izbacujemo neželjene kombinacije
        exclude:
          - os: windows-latest
            node-version: 18.x
          - os: macos-latest
            node-version: 18.x
            
        # Ovdje dodajemo dodatne varijable za specifičnu kombinaciju
        include:
          - os: ubuntu-latest
            node-version: 20.x
            experimental: true
            extra-flag: "--coverage"
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Postavi Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          
      - name: Instaliraj zavisnosti
        run: npm ci
        
      - name: Pokreni testove
        run: npm test

      # Ovaj korak će ispisati extra-flag samo tamo gdje je uključen (Ubuntu + Node 20)
      - name: Ispisi dodatne zastavice ako postoje
        run: |
          echo "Operativni sistem: ${{ matrix.os }}"
          echo "Eksperimentalno: ${{ matrix.experimental }}"
          echo "Dodatna zastavica: ${{ matrix.extra-flag }}"
